version: "3.9"

services:
  scraper-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: lex-advisor/scraper-api:dev
    environment:
      API_KEY: ${API_KEY:-dev-api-key-change-me}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-ph-balta-doamnei}
      SERVICE_VERSION: ${SERVICE_VERSION:-1.0.0}
      ACTIVE_WORKERS: ${ACTIVE_WORKERS:-4}
      RABBITMQ_URL: ${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://lex:lex@postgres:5432/scraper}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8080/v1/health -H 'Authorization: Bearer ${API_KEY:-dev-api-key-change-me}' -H 'X-Request-ID: 00000000-0000-4000-8000-000000000001' -H 'X-Tenant-ID: ${DEFAULT_TENANT_ID:-ph-balta-doamnei}' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - lex-advisor

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lex-advisor

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lex
      POSTGRES_PASSWORD: lex
      POSTGRES_DB: scraper
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lex -d scraper"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lex-advisor
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lex-advisor

  test:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_KEY: ${API_KEY:-dev-api-key-change-me}
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-ph-balta-doamnei}
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgresql+asyncpg://lex:lex@postgres:5432/scraper
      REDIS_URL: redis://redis:6379/0
    depends_on:
      scraper-api:
        condition: service_healthy
    entrypoint: ["pytest", "tests"]
    networks:
      - lex-advisor

networks:
  lex-advisor:
    name: lex-advisor

volumes:
  postgres_data: