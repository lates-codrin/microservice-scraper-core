openapi: 3.0.3
info:
  title: Lex-Advisor Scraper Service API
  version: 1.0.0
  description: "HTTP contract between the Lex-Advisor platform (caller) and any external\n\
    Scraper service (provider). Scraper discovers, fetches, and normalizes\ndocuments\
    \ from Romanian cityhall (primărie) websites so they can be\nindexed by the RAG\
    \ layer.\n\nAny implementation — commercial vendor (Firecrawl, Apify, Zyte, Bright\n\
    Data), OSS fork, per-site Romanian freelancer build — that conforms\nto this spec\
    \ is a drop-in replacement.\n\nCompanion docs:\n  - docs/external/scraper-api-spec.md\
    \ (full narrative spec)"
  contact:
    name: Lex-Advisor Platform Team
    email: costin@citydock.ro
  license:
    name: Apache-2.0 WITH Commons-Clause-1.0
  x-scalar-theme: purple
paths:
  /v1/scrape:
    post:
      tags:
      - scrape
      summary: Scrape Url
      description: Scrape a single URL synchronously or queue it for async processing.
      operationId: scrape_url_v1_scrape_post
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: Idempotency-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScrapeRequest'
            example:
              url: https://example.com
              output_formats:
              - markdown
      x-codeSamples:
      - lang: curl
        source: |
          curl -X POST "$BASE_URL/v1/scrape" \
            -H "Authorization: Bearer $API_KEY" \
            -H "X-Tenant-ID: test-tenant" \
            -H "X-Request-ID: req_123" \
            -H "Idempotency-Key: idem_123" \
            -H "Content-Type: application/json" \
            -d '{"url":"https://example.com","output_formats":["markdown"]}'
      - lang: python
        source: |
          import requests

          resp = requests.post(
              "https://api.example.com/v1/scrape",
              headers={
                  "Authorization": "Bearer <api-key>",
                  "X-Tenant-ID": "test-tenant",
                  "X-Request-ID": "req_123",
                  "Idempotency-Key": "idem_123",
              },
              json={"url": "https://example.com", "output_formats": ["markdown"]},
              timeout=30,
          )
          print(resp.status_code, resp.json())
      - lang: javascript
        source: |
          const response = await fetch("https://api.example.com/v1/scrape", {
            method: "POST",
            headers: {
              "Authorization": "Bearer <api-key>",
              "X-Tenant-ID": "test-tenant",
              "X-Request-ID": "req_123",
              "Idempotency-Key": "idem_123",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              url: "https://example.com",
              output_formats: ["markdown"]
            })
          });

          console.log(response.status, await response.json());
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScrapeResponse'
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
          description: Accepted
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/crawl:
    post:
      tags:
      - crawl
      summary: Start Crawl
      description: Start a new crawl job. Returns 202 Accepted with job metadata.
      operationId: start_crawl_v1_crawl_post
      parameters:
      - name: Idempotency-Key
        in: header
        required: true
        schema:
          type: string
          format: uuid
          title: Idempotency-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CrawlRequest'
            example:
              config:
                seed_urls:
                - https://example.com
                allowed_domains:
                - example.com
      x-codeSamples:
      - lang: curl
        source: |
          curl -X POST "$BASE_URL/v1/crawl" \
            -H "Authorization: Bearer $API_KEY" \
            -H "X-Tenant-ID: test-tenant" \
            -H "X-Request-ID: req_123" \
            -H "Idempotency-Key: idem_123" \
            -H "Content-Type: application/json" \
            -d '{"config":{"seed_urls":["https://example.com"],"allowed_domains":["example.com"]}}'
      - lang: python
        source: |
          import requests

          resp = requests.post(
              "https://api.example.com/v1/crawl",
              headers={
                  "Authorization": "Bearer <api-key>",
                  "X-Tenant-ID": "test-tenant",
                  "X-Request-ID": "req_123",
                  "Idempotency-Key": "idem_123",
              },
              json={
                  "config": {
                      "seed_urls": ["https://example.com"],
                      "allowed_domains": ["example.com"],
                  }
              },
              timeout=30,
          )
          print(resp.status_code, resp.json())
      - lang: javascript
        source: |
          const response = await fetch("https://api.example.com/v1/crawl", {
            method: "POST",
            headers: {
              "Authorization": "Bearer <api-key>",
              "X-Tenant-ID": "test-tenant",
              "X-Request-ID": "req_123",
              "Idempotency-Key": "idem_123",
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              config: {
                seed_urls: ["https://example.com"],
                allowed_domains: ["example.com"]
              }
            })
          });

          console.log(response.status, await response.json());
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrawlAcceptedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/jobs/{job_id}:
    get:
      tags:
      - job
      summary: Get Job
      description: Get job status and metadata.
      operationId: get_job_v1_jobs__job_id__get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CrawlJob'
        '404':
          description: Job not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - job
      summary: Delete Job
      description: Hard-delete a job and all its documents.
      operationId: delete_job_v1_jobs__job_id__delete
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '204':
          description: Successful Response
        '404':
          description: Job not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/jobs/{job_id}/documents:
    get:
      tags:
      - job
      summary: Get Job Documents
      description: Get paginated documents for a job with optional filtering.
      operationId: get_job_documents_v1_jobs__job_id__documents_get
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      - name: cursor
        in: query
        required: false
        description: Opaque pagination token returned by a previous response.
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        description: Maximum number of documents to return per page.
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 100
          title: Limit
      - name: doc_type
        in: query
        required: false
        description: Filter by classification doc type.
        schema:
          anyOf:
          - $ref: '#/components/schemas/DocType'
          - type: 'null'
          title: Doc Type
      - name: min_confidence
        in: query
        required: false
        description: Minimum classification confidence threshold.
        schema:
          type: number
          maximum: 1.0
          minimum: 0.0
          default: 0.0
          title: Min Confidence
      - name: changed_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Changed Only
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPageResponse'
        '404':
          description: Job not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/jobs/{job_id}/cancel:
    post:
      tags:
      - job
      summary: Cancel Job
      description: Cancel a running crawl job, salvaging any completed documents.
      operationId: cancel_job_v1_jobs__job_id__cancel_post
      parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: string
          title: Job Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelJobResponse'
        '404':
          description: Job not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/classify:
    post:
      tags:
      - classify
      summary: Classify
      description: For reclassifying existing documents without re-fetching.
      operationId: classify_v1_classify_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassifyRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassifyResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/extract:
    post:
      tags:
      - extract
      summary: Extract
      description: 'Extract structured fields from document content.


        Supports all 18 doc_types:

        - hcl, dispozitie_primar, act_normativ_local, proiect_hotarare

        - regulament, buget, raport_executie_bugetara, pug, puz

        - strategie, organigrama, raport_activitate, proces_verbal

        - consultare_publica, anunt_public, anunt_achizitie

        - declaratie_avere, other'
      operationId: extract_v1_extract_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtractRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtractResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/health:
    get:
      tags:
      - health
      summary: Healthcheck
      description: Service health check with real dependency probing.
      operationId: healthcheck_v1_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatusResponse'
  /v1/metrics:
    get:
      tags:
      - health
      summary: Prometheus metrics exposition
      description: Prometheus-format metrics for scraping. Includes http_requests_total,
        http_request_duration_seconds, vendor_cost_usd_total, vendor_tokens_total,
        vendor_external_api_errors_total, active_jobs, documents_scraped_total.
      operationId: metrics_v1_metrics_get
      parameters:
      - name: X-Request-ID
        in: header
        required: true
        schema:
          type: string
          title: X-Request-Id
      - name: X-Tenant-ID
        in: header
        required: true
        schema:
          type: string
          title: X-Tenant-Id
      responses:
        '200':
          description: Successful Response
          content:
            text/plain:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/openapi.json:
    get:
      tags:
      - openapi
      summary: Openapi Json
      description: Serve the OpenAPI spec as JSON.
      operationId: openapi_json_v1_openapi_json_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    AsyncJobResponse:
      properties:
        job_id:
          type: string
          title: Job Id
        status:
          type: string
          title: Status
      type: object
      required:
      - job_id
      - status
      title: AsyncJobResponse
    CancelJobResponse:
      properties:
        job_id:
          type: string
          title: Job Id
        status:
          type: string
          title: Status
        documents_salvaged:
          type: integer
          minimum: 0.0
          title: Documents Salvaged
          default: 0
      type: object
      required:
      - job_id
      - status
      title: CancelJobResponse
    ClassifyAlternative:
      properties:
        doc_type:
          $ref: '#/components/schemas/DocType'
        confidence:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Confidence
      type: object
      required:
      - doc_type
      - confidence
      title: ClassifyAlternative
    ClassifyRequest:
      properties:
        content:
          type: string
          title: Content
        url_hint:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Url Hint
        title_hint:
          anyOf:
          - type: string
          - type: 'null'
          title: Title Hint
      type: object
      required:
      - content
      title: ClassifyRequest
    ClassifyResponse:
      properties:
        doc_type:
          $ref: '#/components/schemas/DocType'
        doc_type_confidence:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Doc Type Confidence
        language:
          type: string
          title: Language
        alternatives:
          items:
            $ref: '#/components/schemas/ClassifyAlternative'
          type: array
          title: Alternatives
      type: object
      required:
      - doc_type
      - doc_type_confidence
      - language
      title: ClassifyResponse
    ContentType:
      type: string
      enum:
      - html
      - pdf
      - docx
      - xlsx
      - image
      - other
      title: ContentType
    CrawlAcceptedResponse:
      properties:
        job_id:
          type: string
          title: Job Id
        status:
          type: string
          title: Status
        submitted_at:
          type: string
          format: date-time
          title: Submitted At
        estimated_completion_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Estimated Completion At
      type: object
      required:
      - job_id
      - status
      - submitted_at
      title: CrawlAcceptedResponse
    CrawlAuth:
      properties:
        type:
          type: string
          enum:
          - basic
          - cookie
          - form
          title: Type
        credentials:
          additionalProperties: true
          type: object
          title: Credentials
      type: object
      required:
      - type
      title: CrawlAuth
    CrawlConfig:
      properties:
        seed_urls:
          items:
            type: string
            maxLength: 2083
            minLength: 1
            format: uri
          type: array
          maxItems: 20
          minItems: 1
          title: Seed Urls
        allowed_domains:
          items:
            type: string
          type: array
          title: Allowed Domains
        max_depth:
          type: integer
          maximum: 20.0
          minimum: 1.0
          title: Max Depth
          default: 5
        max_pages:
          type: integer
          maximum: 100000.0
          minimum: 1.0
          title: Max Pages
          default: 2000
        include_patterns:
          items:
            type: string
          type: array
          title: Include Patterns
        exclude_patterns:
          items:
            type: string
          type: array
          title: Exclude Patterns
        doc_types_wanted:
          items:
            $ref: '#/components/schemas/DocType'
          type: array
          title: Doc Types Wanted
        respect_robots_txt:
          type: boolean
          title: Respect Robots Txt
          default: true
        max_requests_per_second:
          type: number
          maximum: 10.0
          minimum: 0.1
          title: Max Requests Per Second
          default: 1.0
        user_agent:
          anyOf:
          - type: string
          - type: 'null'
          title: User Agent
        follow_pdfs:
          type: boolean
          title: Follow Pdfs
          default: true
        max_pdf_size_mb:
          type: integer
          minimum: 1.0
          title: Max Pdf Size Mb
          default: 50
        render_javascript:
          $ref: '#/components/schemas/RenderMode'
          default: auto
        sitemap_hint_url:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Sitemap Hint Url
        auth:
          anyOf:
          - $ref: '#/components/schemas/CrawlAuth'
          - type: 'null'
        redact_pii:
          type: boolean
          title: Redact Pii
          default: false
      type: object
      required:
      - seed_urls
      title: CrawlConfig
    CrawlJob:
      properties:
        job_id:
          type: string
          title: Job Id
        tenant_id:
          type: string
          title: Tenant Id
        status:
          $ref: '#/components/schemas/CrawlStatus'
        progress:
          anyOf:
          - $ref: '#/components/schemas/CrawlProgress'
          - type: 'null'
        stats:
          anyOf:
          - $ref: '#/components/schemas/CrawlStats'
          - type: 'null'
        config:
          anyOf:
          - $ref: '#/components/schemas/CrawlConfig'
          - type: 'null'
        callback_url:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Callback Url
        submitted_at:
          type: string
          format: date-time
          title: Submitted At
        started_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Started At
        estimated_completion_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Estimated Completion At
        completed_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Completed At
        error:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Error
      additionalProperties: true
      type: object
      required:
      - job_id
      - tenant_id
      - status
      - submitted_at
      title: CrawlJob
    CrawlProgress:
      properties:
        stage:
          type: string
          title: Stage
        urls_discovered:
          type: integer
          minimum: 0.0
          title: Urls Discovered
        urls_fetched:
          type: integer
          minimum: 0.0
          title: Urls Fetched
        documents_extracted:
          type: integer
          minimum: 0.0
          title: Documents Extracted
        documents_classified:
          type: integer
          minimum: 0.0
          title: Documents Classified
        urls_pending:
          type: integer
          minimum: 0.0
          title: Urls Pending
        bytes_downloaded:
          type: integer
          minimum: 0.0
          title: Bytes Downloaded
      type: object
      required:
      - stage
      - urls_discovered
      - urls_fetched
      - documents_extracted
      - documents_classified
      - urls_pending
      - bytes_downloaded
      title: CrawlProgress
    CrawlRequest:
      properties:
        config:
          $ref: '#/components/schemas/CrawlConfig'
        incremental:
          anyOf:
          - $ref: '#/components/schemas/IncrementalOptions'
          - type: 'null'
        callback_url:
          anyOf:
          - type: string
            maxLength: 2083
            minLength: 1
            format: uri
          - type: 'null'
          title: Callback Url
        priority:
          type: string
          pattern: ^(low|normal|high)$
          title: Priority
          default: normal
      type: object
      required:
      - config
      title: CrawlRequest
    CrawlStats:
      properties:
        by_doc_type:
          additionalProperties:
            type: integer
          type: object
          title: By Doc Type
        http_errors:
          additionalProperties:
            type: integer
          type: object
          title: Http Errors
      type: object
      title: CrawlStats
    CrawlStatus:
      type: string
      enum:
      - queued
      - fetching_sitemap
      - crawling
      - extracting
      - classifying
      - done
      - failed
      - cancelled
      - partial
      title: CrawlStatus
    DocType:
      type: string
      enum:
      - hcl
      - dispozitie_primar
      - act_normativ_local
      - proiect_hotarare
      - regulament
      - buget
      - raport_executie_bugetara
      - pug
      - puz
      - strategie
      - organigrama
      - raport_activitate
      - proces_verbal
      - consultare_publica
      - anunt_public
      - anunt_achizitie
      - declaratie_avere
      - other
      title: DocType
    DocumentPageResponse:
      properties:
        documents:
          items:
            $ref: '#/components/schemas/ScrapedDocument'
          type: array
          title: Documents
        next_cursor:
          anyOf:
          - type: string
          - type: 'null'
          title: Next Cursor
        has_more:
          type: boolean
          title: Has More
        total_available:
          type: integer
          minimum: 0.0
          title: Total Available
          default: 0
      type: object
      required:
      - documents
      - has_more
      title: DocumentPageResponse
    ExtractRequest:
      properties:
        content:
          type: string
          title: Content
        doc_type:
          $ref: '#/components/schemas/DocType'
        schema:
          additionalProperties: true
          type: object
          title: Schema
      type: object
      required:
      - content
      - doc_type
      - schema
      title: ExtractRequest
    ExtractResponse:
      properties:
        fields:
          additionalProperties: true
          type: object
          title: Fields
        field_confidence:
          additionalProperties:
            type: number
          type: object
          title: Field Confidence
        missing_fields:
          items:
            type: string
          type: array
          title: Missing Fields
      type: object
      required:
      - fields
      title: ExtractResponse
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthStatusResponse:
      properties:
        status:
          type: string
          title: Status
        version:
          type: string
          title: Version
        uptime_seconds:
          type: integer
          minimum: 0.0
          title: Uptime Seconds
        dependencies:
          additionalProperties:
            type: string
          type: object
          title: Dependencies
        queue_depth:
          type: integer
          minimum: 0.0
          title: Queue Depth
        active_workers:
          type: integer
          minimum: 0.0
          title: Active Workers
      type: object
      required:
      - status
      - version
      - uptime_seconds
      - dependencies
      - queue_depth
      - active_workers
      title: HealthStatusResponse
    IncrementalOptions:
      properties:
        since:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Since
        previous_job_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Previous Job Id
        known_content_hashes:
          items:
            type: string
          type: array
          title: Known Content Hashes
      type: object
      title: IncrementalOptions
    RenderMode:
      type: string
      enum:
      - always
      - never
      - auto
      title: RenderMode
    ScrapeRequest:
      properties:
        url:
          type: string
          maxLength: 2083
          minLength: 1
          format: uri
          title: Url
        render_javascript:
          $ref: '#/components/schemas/RenderMode'
          default: auto
        follow_redirects:
